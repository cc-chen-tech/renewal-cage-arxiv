  <circle cx="145.0" cy="262.5" r="7" fill="#2f855a" /><text x="103.0" y="464" font-family="Arial, sans-serif" font-size="11">consistent</text><circle cx="297.5" cy="262.5" r="7" fill="#c05621" /><text x="255.5" y="464" font-family="Arial, sans-serif" font-size="11">late ngp mismatch</text><text x="440.0" y="360" font-family="Arial, sans-serif" font-size="20" fill="#c05621">x</text><text x="408.0" y="464" font-family="Arial, sans-serif" font-size="11">alpha too fast</text>
  
