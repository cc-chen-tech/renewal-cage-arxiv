<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="420" viewBox="0 0 1160 420">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="75" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700">GlassBench real-inversion unlock protocol</text>
  <text x="75" y="67" font-family="Arial, sans-serif" font-size="13" fill="#444">Minimum additional payload needed before promoting short-window real-data canaries to uncertainty-weighted trajectory inversion.</text>
  <text x="75" y="88" font-family="Arial, sans-serif" font-size="12" font-weight="700">target</text>
  <text x="203" y="88" font-family="Arial, sans-serif" font-size="12" font-weight="700">unlock stage</text>
  <text x="540" y="88" font-family="Arial, sans-serif" font-size="12" font-weight="700">minimum missing payload</text>
  <text x="75" y="129" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="203" y="107" width="310" height="27" fill="#c05621" opacity="0.92" /><text x="213" y="125" font-family="Arial, sans-serif" font-size="10" fill="#fff">minimum real inversion payload missing</text><text x="540" y="125" font-family="Arial, sans-serif" font-size="11">frames=20; result time points=8; mapping=0; extra members=1</text><text x="203" y="152" font-family="Arial, sans-serif" font-size="9" fill="#555">payload: frame time mapping;one more independent npz member;lag time;self intermediate scattering by k;chi4 overlap;sigma msd;sigma ngp 2d;si</text><text x="203" y="170" font-family="Arial, sans-serif" font-size="9" fill="#555">after unlock: uncertainty weighted real trajectory inversion</text><text x="75" y="205" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="203" y="183" width="310" height="27" fill="#c05621" opacity="0.92" /><text x="213" y="201" font-family="Arial, sans-serif" font-size="10" fill="#fff">minimum real inversion payload missing</text><text x="540" y="201" font-family="Arial, sans-serif" font-size="11">frames=20; result time points=6; mapping=0; extra members=1</text><text x="203" y="228" font-family="Arial, sans-serif" font-size="9" fill="#555">payload: frame time mapping;one more independent npz member;lag time;self intermediate scattering by k;chi4 overlap;sigma msd;sigma ngp 2d;si</text><text x="203" y="246" font-family="Arial, sans-serif" font-size="9" fill="#555">after unlock: uncertainty weighted real trajectory inversion</text>
  <rect x="75" y="360" width="14" height="14" fill="#c05621" /><text x="96" y="372" font-family="Arial, sans-serif" font-size="12">current KA2D rows still miss frame-time mapping, ensemble margin, observables, and uncertainties</text>
  <rect x="720" y="360" width="14" height="14" fill="#2f855a" /><text x="741" y="372" font-family="Arial, sans-serif" font-size="12">green means ready for real persistence/exchange inversion</text>
</svg>
