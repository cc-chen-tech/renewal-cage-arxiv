  <text x="75" y="129" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA T=none</text><rect x="195" y="108" width="355" height="26" fill="#4a5568" opacity="0.92" /><text x="205" y="125" font-family="Arial, sans-serif" font-size="10" fill="#fff">trajectory layout incomplete</text><text x="570" y="127" font-family="Arial, sans-serif" font-size="11">indexed members=0/4; threshold pass=0; split=none</text><text x="195" y="155" font-family="Arial, sans-serif" font-size="9" fill="#555">8 MB compressed range, tar prefix=0 bytes; first four: none</text><text x="195" y="170" font-family="Arial, sans-serif" font-size="9" fill="#555">next: complete inner tar layout probe</text><text x="75" y="207" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="195" y="186" width="355" height="26" fill="#2b6cb0" opacity="0.92" /><text x="205" y="203" font-family="Arial, sans-serif" font-size="10" fill="#fff">member index threshold ready extraction pending</text><text x="570" y="205" font-family="Arial, sans-serif" font-size="11">indexed members=9/4; threshold pass=1; split=test</text><text x="195" y="233" font-family="Arial, sans-serif" font-size="9" fill="#555">8 MB compressed range, tar prefix=4194304 bytes; first four: N1290T0.23_202_tc05;N1290T0.23_228_tc05;N1290T0.23_299_tc05;N1290T0.23_299_tc10</text><text x="195" y="248" font-family="Arial, sans-serif" font-size="9" fill="#555">next: extract indexed npz members and compute uncertainties</text><text x="75" y="285" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="195" y="264" width="355" height="26" fill="#2b6cb0" opacity="0.92" /><text x="205" y="281" font-family="Arial, sans-serif" font-size="10" fill="#fff">member index threshold ready extraction pending</text><text x="570" y="283" font-family="Arial, sans-serif" font-size="11">indexed members=10/4; threshold pass=1; split=train</text><text x="195" y="311" font-family="Arial, sans-s