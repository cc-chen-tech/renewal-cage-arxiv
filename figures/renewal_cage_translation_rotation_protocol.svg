  <line x1="500" y1="380" x2="765" y2="380" stroke="#222" />
  <line x1="500" y1="380" x2="500" y2="105" stroke="#222" />
  <text x="500" y="83" font-family="Arial, sans-serif" font-size="17" font-weight="700">B. Inversion residual</text>
  <rect x="163.0" y="289.7" width="28" height="90.3" fill="#2f855a" /><rect x="199.0" y="289.7" width="28" height="90.3" fill="#805ad5" /><text x="130.0" y="404" font-family="Arial, sans-serif" font-size="11">coupled clock</text><text x="130.0" y="422" font-family="Arial, sans-serif" font-size="9" fill="#555">tau_r/tau_a=0.95; pass=0</text><circle cx="565.0" cy="380.0" r="5" fill="#2b6cb0" /><text x="532.0" y="404" font-family="Arial, sans-serif" font-size="11">coupled clock</text><rect x="328.0" y="140.9" width="28" height="239.1" fill="#c05621" /><rect x="364.0" y="140.9" width="28" height="239.1" fill="#805ad5" /><text x="295.0" y="404" font-family="Arial, sans-serif" font-size="11">rotationally slow clock</text><text x="295.0" y="422" font-family="Arial, sans-serif" font-size="9" fill="#555">tau_r/tau_a=2.52; pass=1</text><circle cx="660.0" cy="380.0" r="5" fill="#2b6cb0" /><text x="627.0" y="404" font-family="Arial, sans-serif" font-size="11">rotationally slow </text>
  <rect x="108" y="125" width="14" height="14" fill="#c05621" /><text x="130" y="137" font-family="Arial, sans-serif" font-size="12">tau_rot / tau_alpha</text>
