  <text x="205" y="96" font-family="Arial, sans-serif" font-size="12" font-weight="700">PE feasibility stage</text>
  <text x="660" y="96" font-family="Arial, sans-serif" font-size="12" font-weight="700">conditional identifiability bound</text>
  <text x="75" y="136" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="205" y="114" width="430" height="27" fill="#854d0e" opacity="0.92" /><text x="215" y="132" font-family="Arial, sans-serif" font-size="10" fill="#fff">direct alpha transport bounds pe but event clock missing</text><text x="660" y="134" font-family="Arial, sans-serif" font-size="11">structure=151; q_max=0.486; q_max/MSD=0.498; full-MSD feasible=0</text><text x="660" y="156" font-family="Arial, sans-serif" font-size="10" fill="#555">at q=0.2 MSD: tau_x=6e+05; tau_p=1.41e+06; tau_p/tau_x=2.35</text><text x="660" y="176" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=event clock jump variance; next=measure cage jump event variance from particle event c</text><text x="75" y="224" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="205" y="202" width="430" height="27" fill="#4a5568" opacity="0.92" /><text x="215" y="220" font-family="Arial, sans-serif" font-size="10" fill="#fff">direct alpha transport upstream incomplete</text><text x="660" y="222" font-family="Arial, sans-serif" font-size="11">structure=none; q_max=0; q_max/MSD=0; full-MSD feasible=0</text><text x="660" y="244" font-family="Arial, sans-serif" font-size="10" fill="#555">at q=0.2 MSD: tau_x=0; tau_p=0; tau_p/tau_x=0</text><text x="660" y="264" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=direct alpha transport proxy; next=complete direct alpha transport proxy</text>
