  <text x="671" y="102" font-family="Arial, sans-serif" font-size="12" font-weight="700">acquisition target</text>
  <text x="76" y="142" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="206" y="120" width="438" height="27" fill="#2b6cb0" opacity="0.92" /><text x="216" y="138" font-family="Arial, sans-serif" font-size="10" fill="#fff">late recovery timecode target ready</text><text x="671" y="140" font-family="Arial, sans-serif" font-size="11">structure=151; current=tc40 (1.5e+06); required lag=4.3e+07</text><text x="671" y="162" font-family="Arial, sans-serif" font-size="10" fill="#555">target=tc50 (1.66e+08); target/required=3.86; steps needed=2</text><text x="671" y="184" font-family="Arial, sans-serif" font-size="10" fill="#555">late observation ready=0; real PE inversion=0; blocker=late recovery time code cache</text><text x="671" y="206" font-family="Arial, sans-serif" font-size="10" fill="#555">next=extract or cache glassbench time code tc50 late recovery observables</text><text x="76" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="206" y="228" width="438" height="27" fill="#4a5568" opacity="0.92" /><text x="216" y="246" font-family="Arial, sans-serif" font-size="10" fill="#fff">late recovery timecode target upstream incomplete</text><text x="671" y="248" font-family="Arial, sans-serif" font-size="11">structure=3; current=none (0); required lag=0</text><text x="671" y="270" font-family="Arial, sans-serif" font-size="10" fill="#555">target=none (0); target/required=0; steps needed=0</text><text x="671" y="292" font-family="Arial, sans-serif" font-size="10" fill="#555">late observation ready=0; real PE inversion=0; blocker=finite exchange envelope</text><text x="671" y="314" font-family="Arial, sans-serif" font-size="10" fill="#555">next=complete finite exchange falsification envelope</text><text x="76" y="358" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="206" y="336" width="438" height="27" fill="#4a5568" opacity="0.92" /><text x="2