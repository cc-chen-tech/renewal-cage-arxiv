<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="330" viewBox="0 0 1160 330">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="75" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700">GlassBench threshold-sweep payload contract</text>
  <text x="75" y="66" font-family="Arial, sans-serif" font-size="13" fill="#444">The contract names the minimum additional public payload needed before promoting fixed-lag threshold evidence into a cross-temperature event-clock comparison.</text>
  <text x="75" y="96" font-family="Arial, sans-serif" font-size="12" font-weight="700">target</text>
  <text x="205" y="96" font-family="Arial, sans-serif" font-size="12" font-weight="700">payload stage</text>
  <text x="640" y="96" font-family="Arial, sans-serif" font-size="12" font-weight="700">minimum acquisition contract</text>
  <text x="75" y="136" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="205" y="114" width="410" height="27" fill="#c05621" opacity="0.92" /><text x="215" y="132" font-family="Arial, sans-serif" font-size="10" fill="#fff">threshold rule revision required</text><text x="640" y="134" font-family="Arial, sans-serif" font-size="11">lags=8/3; additional lags=0; official ladder=1</text><text x="640" y="156" font-family="Arial, sans-serif" font-size="10" fill="#555">known codes=tc05;tc10;tc15;tc20;tc25;tc30;tc35;tc40; payload=preregistered nonrecrossing event definition</text><text x="640" y="176" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=threshold sensitivity recrossing and replica identity; next=define true time nonrecrossing cage jump rule</text><text x="75" y="224" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="205" y="202" width="410" height="27" fill="#805ad5" opacity="0.92" /><text x="215" y="220" font-family="Arial, sans-serif" font-size="10" fill="#fff">multi lag payload request ready</text><text x="640" y="222" font-family="Arial, sans-serif" font-size="11">lags=1/3; additional lags=2; official ladder=0</text><text x="640" y="244" font-family="Arial, sans-serif" font-size="10" fill="#555">known codes=tc01; payload=official multi lag member index and particle coordinates</text><text x="640" y="264" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=insufficient lag coverage; next=obtain T0 30 multi lag member index with at least 2 additional</text>
</svg>
