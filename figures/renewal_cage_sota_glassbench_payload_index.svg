  <text x="75" y="128" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA</text><rect x="165" y="108" width="235" height="24" fill="#c05621" opacity="0.92" /><text x="175" y="124" font-family="Arial, sans-serif" font-size="10" fill="#fff">remote payload missing trajectory</text><text x="425" y="127" font-family="Arial, sans-serif" font-size="11">traj=0; model=4; result=14; index=0; real=0; blocker=trajectory payload</text><text x="165" y="154" font-family="Arial, sans-serif" font-size="9" fill="#555">common all: none; model/result: 0.44;0.50;0.56;0.64</text><text x="165" y="168" font-family="Arial, sans-serif" font-size="9" fill="#555">trajectory T: none; model T: 0.44;0.50;0.56;0.64; result T: 0.44;0.50;0.56;0.64</text><text x="75" y="210" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D</text><rect x="165" y="190" width="235" height="24" fill="#2f855a" opacity="0.92" /><text x="175" y="206" font-family="Arial, sans-serif" font-size="10" fill="#fff">remote payload index verified</text><text x="425" y="209" font-family="Arial, sans-serif" font-size="11">traj=2; model=2; result=10; index=1; real=0; blocker=archive cache</text><text x="165" y="236" font-family="Arial, sans-serif" font-size="9" fill="#555">common all: 0.23;0.30; model/result: 0.23;0.30</text><text x="165" y="250" font-family="Arial, sans-serif" font-size="9" fill="#555">trajectory T: 0.23;0.30; model T: 0.23;0.30; result T: 0.23;0.30</text>
