<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="455" viewBox="0 0 1140 455">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="72" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700">Benchmark publication claim ladder</text>
  <text x="72" y="66" font-family="Arial, sans-serif" font-size="13" fill="#444">Existing gates are collapsed into manuscript-safe claim levels, separating real-data fits from protocol canaries and scope boundaries.</text>
  <text x="72" y="86" font-family="Arial, sans-serif" font-size="12" font-weight="700">ladder row</text>
  <text x="372" y="86" font-family="Arial, sans-serif" font-size="12" font-weight="700">publication stage</text>
  <text x="632" y="86" font-family="Arial, sans-serif" font-size="12" font-weight="700">allowed claim</text>
  <text x="887" y="86" font-family="Arial, sans-serif" font-size="12" font-weight="700">fit guard</text>
  <text x="72" y="125" font-family="Arial, sans-serif" font-size="12">glassbench current publication state</text><rect x="372" y="108" width="235" height="24" fill="#d69e2e" opacity="0.92" /><text x="382" y="124" font-family="Arial, sans-serif" font-size="11" fill="#fff">metadata verified not reanalysis</text><text x="632" y="125" font-family="Arial, sans-serif" font-size="12">metadata readiness only</text><text x="887" y="125" font-family="Arial, sans-serif" font-size="12">real=0; overreach=1</text><text x="372" y="151" font-family="Arial, sans-serif" font-size="10" fill="#555">next: cache full archive and verify checksum</text><text x="72" y="195" font-family="Arial, sans-serif" font-size="12">synthetic trajectory canary</text><rect x="372" y="178" width="235" height="24" fill="#2f855a" opacity="0.92" /><text x="382" y="194" font-family="Arial, sans-serif" font-size="11" fill="#fff">synthetic prediction canary passed</text><text x="632" y="195" font-family="Arial, sans-serif" font-size="12">protocol canary passed</text><text x="887" y="195" font-family="Arial, sans-serif" font-size="12">real=0; overreach=0</text><text x="372" y="221" font-family="Arial, sans-serif" font-size="10" fill="#555">next: repeat protocol on real public trajectory</text><text x="72" y="265" font-family="Arial, sans-serif" font-size="12">fit only negative control publication stat</text><rect x="372" y="248" width="235" height="24" fill="#b83280" opacity="0.92" /><text x="382" y="264" font-family="Arial, sans-serif" font-size="11" fill="#fff">fit only overclaim blocked</text><text x="632" y="265" font-family="Arial, sans-serif" font-size="12">do not claim prediction</text><text x="887" y="265" font-family="Arial, sans-serif" font-size="12">real=0; overreach=1</text><text x="372" y="291" font-family="Arial, sans-serif" font-size="10" fill="#555">next: add heldout predictions before claiming fit</text><text x="72" y="335" font-family="Arial, sans-serif" font-size="12">thermodynamic scope publication boundary</text><rect x="372" y="318" width="235" height="24" fill="#805ad5" opacity="0.92" /><text x="382" y="334" font-family="Arial, sans-serif" font-size="11" fill="#fff">thermodynamic scope boundary</text><text x="632" y="335" font-family="Arial, sans-serif" font-size="12">scope boundary only</text><text x="887" y="335" font-family="Arial, sans-serif" font-size="12">real=0; overreach=0</text><text x="372" y="361" font-family="Arial, sans-serif" font-size="10" fill="#555">next: do not convert closure to thermodynamic derivation</text>
  <rect x="72" y="402" width="14" height="14" fill="#d69e2e" /><text x="94" y="414" font-family="Arial, sans-serif" font-size="12">metadata verified, not reanalysis</text>
