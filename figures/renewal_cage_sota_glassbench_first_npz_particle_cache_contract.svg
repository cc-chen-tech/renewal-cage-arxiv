<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="350" viewBox="0 0 1220 350">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="75" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700">GlassBench first-NPZ particle cache contract</text>
  <text x="75" y="66" font-family="Arial, sans-serif" font-size="13" fill="#444">The contract pins byte ranges, NPZ identity, coordinate shape, and the local cache target required before real event-clock threshold sweeps.</text>
  <text x="75" y="96" font-family="Arial, sans-serif" font-size="12" font-weight="700">target</text>
  <text x="205" y="96" font-family="Arial, sans-serif" font-size="12" font-weight="700">contract stage</text>
  <text x="640" y="96" font-family="Arial, sans-serif" font-size="12" font-weight="700">coordinate-cache payload</text>
  <text x="75" y="136" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="205" y="114" width="410" height="27" fill="#b7791f" opacity="0.92" /><text x="215" y="132" font-family="Arial, sans-serif" font-size="10" fill="#fff">first npz particle cache contract ready cache missing</text><text x="640" y="134" font-family="Arial, sans-serif" font-size="11">shape=20x1290x2; npz=465710 B; md5=26b4b9af10; cache=0</text><text x="640" y="156" font-family="Arial, sans-serif" font-size="10" fill="#555">range=2980602255-2984796558; blocker=persist_particle_coordinate_cache</text><text x="640" y="176" font-family="Arial, sans-serif" font-size="10" fill="#555">target=data/third_party/glassbench/particle_cache/glassbench_ka2d_T0_23_first_npz_positions.npz</text><text x="75" y="224" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="205" y="202" width="410" height="27" fill="#b7791f" opacity="0.92" /><text x="215" y="220" font-family="Arial, sans-serif" font-size="10" fill="#fff">first npz particle cache contract ready cache missing</text><text x="640" y="222" font-family="Arial, sans-serif" font-size="11">shape=20x1290x2; npz=444786 B; md5=f51fd76f59; cache=0</text><text x="640" y="244" font-family="Arial, sans-serif" font-size="10" fill="#555">range=464175-4658478; blocker=persist_particle_coordinate_cache</text><text x="640" y="264" font-family="Arial, sans-serif" font-size="10" fill="#555">target=data/third_party/glassbench/particle_cache/glassbench_ka2d_T0_30_first_npz_positions.npz</text>
</svg>
