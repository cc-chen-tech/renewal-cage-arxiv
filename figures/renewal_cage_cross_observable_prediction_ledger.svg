<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="560" viewBox="0 0 1160 560">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="70" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700">Cross-observable prediction ledger</text>
  <text x="70" y="66" font-family="Arial, sans-serif" font-size="13" fill="#444">Each protocol separates calibration inputs from held-out predictions and external closure variables.</text>
  <text x="70" y="78" font-family="Arial, sans-serif" font-size="12" font-weight="700">protocol</text>
  <text x="380" y="78" font-family="Arial, sans-serif" font-size="12" font-weight="700">prediction class</text>
  <text x="580" y="78" font-family="Arial, sans-serif" font-size="12" font-weight="700">ledger counts</text>
  <text x="70" y="116" font-family="Arial, sans-serif" font-size="11">alpha vanhove transport raw curves</text><rect x="380" y="96" width="175" height="22" fill="#2f855a" opacity="0.92" /><text x="388" y="111" font-family="Arial, sans-serif" font-size="10" fill="#fff">predictive diagnostic</text><text x="580" y="116" font-family="Arial, sans-serif" font-size="11">fit=3; held-out=3; closure=0; risk=0</text><text x="140" y="134" font-family="Arial, sans-serif" font-size="9" fill="#555">fit: diffusion;debye waller plateau;anchor tau alpha</text><text x="580" y="134" font-family="Arial, sans-serif" font-size="9" fill="#555">predict: multi k tau alpha;late ngp;van hove tail recovery</text><text x="70" y="174" font-family="Arial, sans-serif" font-size="11">joint persistence exchange multik chi4</text><rect x="380" y="154" width="175" height="22" fill="#2f855a" opacity="0.92" /><text x="388" y="169" font-family="Arial, sans-serif" font-size="10" fill="#fff">predictive diagnostic</text><text x="580" y="174" font-family="Arial, sans-serif" font-size="11">fit=2; held-out=4; closure=0; risk=0</text><text x="140" y="192" font-family="Arial, sans-serif" font-size="9" fill="#555">fit: diffusion;anchor tau alpha</text><text x="580" y="192" font-family="Arial, sans-serif" font-size="9" fill="#555">predict: multi k tau alpha;late ngp;stokes einstein product;chi4 peak proxy</text><text x="70" y="232" font-family="Arial, sans-serif" font-size="11">late mechanism selection</text><rect x="380" y="212" width="175" height="22" fill="#2f855a" opacity="0.92" /><text x="388" y="227" font-family="Arial, sans-serif" font-size="10" fill="#fff">predictive diagnostic</text><text x="580" y="232" font-family="Arial, sans-serif" font-size="11">fit=2; held-out=2; closure=0; risk=0</text><text x="140" y="250" font-family="Arial, sans-serif" font-size="9" fill="#555">fit: late ngp point 1;late ngp point 2</text><text x="580" y="250" font-family="Arial, sans-serif" font-size="9" fill="#555">predict: alpha slope;gaussian recovery class</text><text x="70" y="290" font-family="Arial, sans-serif" font-size="11">spatial chi4 front closure</text><rect x="380" y="270" width="175" height="22" fill="#2b6cb0" opacity="0.92" /><text x="388" y="285" font-family="Arial, sans-serif" font-size="10" fill="#fff">closure assisted prediction</text><text x="580" y="290" font-family="Arial, sans-serif" font-size="11">fit=2; held-out=2; closure=1; risk=0</text><text x="140" y="308" font-family="Arial, sans-serif" font-size="9" fill="#555">fit: tau alpha;diffusion</text><text x="580" y="308" font-family="Arial, sans-serif" font-size="9" fill="#555">predict: chi4 peak;dynamic length</text><text x="70" y="348" font-family="Arial, sans-serif" font-size="11">single alpha fit only null</text><rect x="380" y="328" width="175" height="22" fill="#c05621" opacity="0.92" /><text x="388" y="343" font-family="Arial, sans-serif" font-size="10" fill="#fff">underconstrained fit</text><text x="580" y="348" font-family="Arial, sans-serif" font-size="11">fit=1; held-out=0; closure=0; risk=1</text><text x="140" y="366" font-family="Arial, sans-serif" font-size="9" fill="#555">fit: tau alpha</text><text x="580" y="366" font-family="Arial, sans-serif" font-size="9" fill="#555">predict: none</text><text x="70" y="406" font-family="Arial, sans-serif" font-size="11">thermodynamic entropy boundary</text><rect x="380" y="386" width="175" height="22" fill="#805ad5" opacity="0.92" /><text x="388" y="401" font-family="Arial, sans-serif" font-size="10" fill="#fff">scope boundary</text><text x="580" y="406" font-family="Arial, sans-serif" font-size="11">fit=2; held-out=2; closure=1; risk=0</text><text x="140" y="424" font-family="Arial, sans-serif" font-size="9" fill="#555">fit: configurational entropy;temperature grid</text><text x="580" y="424" font-family="Arial, sans-serif" font-size="9" fill="#555">predict: heat capacity anomaly;ideal glass transition</text>
  <rect x="70" y="510" width="14" height="14" fill="#2f855a" /><text x="92" y="522" font-family="Arial, sans-serif" font-size="12">held-out predictive diagnostic</text>
  <rect x="285" y="510" width="14" height="14" fill="#2b6cb0" /><text x="307" y="522" font-family="Arial, sans-serif" font-size="12">closure-assisted prediction</text>
  <rect x="500" y="510" width="14" height="14" fill="#c05621" /><text x="522" y="522" font-family="Arial, sans-serif" font-size="12">fit-only overclaim risk</text>
  <rect x="690" y="510" width="14" height="14" fill="#805ad5" /><text x="712" y="522" font-family="Arial, sans-serif" font-size="12">scope boundary</text>
</svg>
