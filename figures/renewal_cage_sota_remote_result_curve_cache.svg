<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="390" viewBox="0 0 1160 390">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="75" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700">SOTA remote result-curve cache</text>
  <text x="75" y="66" font-family="Arial, sans-serif" font-size="13" fill="#444">Small GlassBench result curves are byte-range fetched, CRC/md5 verified, and numerically parsed before raw-curve adapters are claimed.</text>
  <text x="75" y="88" font-family="Arial, sans-serif" font-size="12" font-weight="700">system</text>
  <text x="165" y="88" font-family="Arial, sans-serif" font-size="12" font-weight="700">stage</text>
  <text x="420" y="88" font-family="Arial, sans-serif" font-size="12" font-weight="700">cache and inversion readiness</text>
  <text x="75" y="128" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA</text><rect x="165" y="108" width="230" height="24" fill="#2f855a" opacity="0.92" /><text x="175" y="124" font-family="Arial, sans-serif" font-size="10" fill="#fff">range result curves verified</text><text x="420" y="127" font-family="Arial, sans-serif" font-size="11">files=10; temps=4; cache=1; inversion=0; blocker=raw curve adapter</text><text x="165" y="154" font-family="Arial, sans-serif" font-size="9" fill="#555">roles: published_figure_curve;rhomax_md;time_grid; temperatures: 0.44;0.50;0.56;0.64</text><text x="165" y="168" font-family="Arial, sans-serif" font-size="9" fill="#555">CRC=1; md5=1; numeric=1; range=1</text><text x="75" y="204" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D</text><rect x="165" y="184" width="230" height="24" fill="#2f855a" opacity="0.92" /><text x="175" y="200" font-family="Arial, sans-serif" font-size="10" fill="#fff">range result curves verified</text><text x="420" y="203" font-family="Arial, sans-serif" font-size="11">files=7; temps=2; cache=1; inversion=0; blocker=raw curve adapter</text><text x="165" y="230" font-family="Arial, sans-serif" font-size="9" fill="#555">roles: published_figure_curve;rhomax_bb;rhomax_md;time_grid; temperatures: 0.23;0.30</text><text x="165" y="244" font-family="Arial, sans-serif" font-size="9" fill="#555">CRC=1; md5=1; numeric=1; range=1</text>
  <rect x="75" y="320" width="14" height="14" fill="#2f855a" /><text x="96" y="332" font-family="Arial, sans-serif" font-size="12">range-cached numeric result curves verified</text>
  <rect x="385" y="320" width="14" height="14" fill="#c05621" /><text x="406" y="332" font-family="Arial, sans-serif" font-size="12">curve cache incomplete</text>
  <text x="610" y="332" font-family="Arial, sans-serif" font-size="12">raw-curve adapter and uncertainties still required for model fitting</text>
</svg>
