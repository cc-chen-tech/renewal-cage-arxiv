  <text x="75" y="136" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="205" y="114" width="430" height="27" fill="#9f1239" opacity="0.92" /><text x="215" y="132" font-family="Arial, sans-serif" font-size="10" fill="#fff">cached direct alpha curve ready event clock blocked</text><text x="660" y="134" font-family="Arial, sans-serif" font-size="11">structure=151; k_root=4.8; lags=8; latest Fs=0.368</text><text x="660" y="156" font-family="Arial, sans-serif" font-size="10" fill="#555">crossed=1; crossing=tc40 at 1.5e+06; monotone=0</text><text x="660" y="176" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=event clock trajectory; next=extract particle event clock at direct alpha anchor</text><text x="75" y="224" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="205" y="202" width="430" height="27" fill="#2b6cb0" opacity="0.92" /><text x="215" y="220" font-family="Arial, sans-serif" font-size="10" fill="#fff">cached direct alpha root upstream incomplete</text><text x="660" y="222" font-family="Arial, sans-serif" font-size="11">structure=none; k_root=0; lags=0; latest Fs=0</text><text x="660" y="244" font-family="Arial, sans-serif" font-size="10" fill="#555">crossed=0; crossing=none at 0; monotone=0</text><text x="660" y="264" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=cached direct alpha root; next=solve cached direct alpha anchor before curve audit</text>
