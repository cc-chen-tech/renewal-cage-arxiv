<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="350" viewBox="0 0 1160 350">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="75" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700">GlassBench time-code signature support</text>
  <text x="75" y="66" font-family="Arial, sans-serif" font-size="13" fill="#444">Real KA2D time-code curves are scored for dynamical signatures before any persistence/exchange inversion is claimed.</text>
  <text x="75" y="96" font-family="Arial, sans-serif" font-size="12" font-weight="700">target</text>
  <text x="205" y="96" font-family="Arial, sans-serif" font-size="12" font-weight="700">signature stage</text>
  <text x="590" y="96" font-family="Arial, sans-serif" font-size="12" font-weight="700">real-curve dynamical support</text>
  <text x="75" y="136" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="205" y="114" width="360" height="27" fill="#b7791f" opacity="0.92" /><text x="215" y="132" font-family="Arial, sans-serif" font-size="10" fill="#fff">real curve dynamic signature support preinversion</text><text x="590" y="134" font-family="Arial, sans-serif" font-size="11">supported=4/4; real curve=1; PE inversion=0; blocker=alpha_threshold_crossing</text><text x="590" y="156" font-family="Arial, sans-serif" font-size="10" fill="#555">MSD growth=340; Fs decay=0.236; alpha crossed=0</text><text x="590" y="176" font-family="Arial, sans-serif" font-size="10" fill="#555">NGP peak t=1.426e+05, recovery=0.63; chi4 peak t=1.426e+05, recovery=0.45</text><text x="590" y="195" font-family="Arial, sans-serif" font-size="10" fill="#555">next=extend timecode curve until alpha threshold crossing</text><text x="75" y="224" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="205" y="202" width="360" height="27" fill="#2b6cb0" opacity="0.92" /><text x="215" y="220" font-family="Arial, sans-serif" font-size="10" fill="#fff">timecode curve upstream incomplete</text><text x="590" y="222" font-family="Arial, sans-serif" font-size="11">supported=0/4; real curve=0; PE inversion=0; blocker=sparse_time_code_coverage</text><text x="590" y="244" font-family="Arial, sans-serif" font-size="10" fill="#555">MSD growth=0; Fs decay=0; alpha crossed=0</text><text x="590" y="264" font-family="Arial, sans-serif" font-size="10" fill="#555">NGP peak t=0, recovery=0.00; chi4 peak t=0, recovery=0.00</text><text x="590" y="283" font-family="Arial, sans-serif" font-size="10" fill="#555">next=complete timecode curve before signature scoring</text>
</svg>
