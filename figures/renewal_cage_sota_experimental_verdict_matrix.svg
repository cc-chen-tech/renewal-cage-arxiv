<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="380" viewBox="0 0 1180 380">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="72" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700">SOTA experimental verdict matrix</text>
  <text x="72" y="66" font-family="Arial, sans-serif" font-size="13" fill="#444">Literature trends, GlassBench support, microdynamic predictions, and scope boundaries are collapsed into manuscript-safe verdicts.</text>
  <text x="72" y="90" font-family="Arial, sans-serif" font-size="12" font-weight="700">verdict row</text>
  <text x="372" y="90" font-family="Arial, sans-serif" font-size="12" font-weight="700">stage</text>
  <text x="692" y="90" font-family="Arial, sans-serif" font-size="12" font-weight="700">evidence flags</text>
  <text x="957" y="90" font-family="Arial, sans-serif" font-size="12" font-weight="700">scope</text>
  <text x="72" y="129" font-family="Arial, sans-serif" font-size="12">sota dynamic signature support</text><rect x="372" y="112" width="292" height="24" fill="#2f855a" opacity="0.92" /><text x="382" y="128" font-family="Arial, sans-serif" font-size="11" fill="#fff">sota dynamic signatures supported</text><text x="692" y="129" font-family="Arial, sans-serif" font-size="12">lit=1; real=1; micro=0; reject=0</text><text x="957" y="129" font-family="Arial, sans-serif" font-size="12">thermo claim=0</text><text x="372" y="155" font-family="Arial, sans-serif" font-size="10" fill="#555">claim: dynamical signature supported; blocker: none</text><text x="72" y="187" font-family="Arial, sans-serif" font-size="12">sota mechanism selection</text><rect x="372" y="170" width="292" height="24" fill="#276749" opacity="0.92" /><text x="382" y="186" font-family="Arial, sans-serif" font-size="11" fill="#fff">mechanism selection protocol supported</text><text x="692" y="187" font-family="Arial, sans-serif" font-size="12">lit=1; real=0; micro=1; reject=1</text><text x="957" y="187" font-family="Arial, sans-serif" font-size="12">thermo claim=0</text><text x="372" y="213" font-family="Arial, sans-serif" font-size="10" fill="#555">claim: mechanism selection protocol supported not real glassbench; blocker: none</text><text x="72" y="245" font-family="Arial, sans-serif" font-size="12">sota real glassbench closed loop</text><rect x="372" y="228" width="292" height="24" fill="#2b6cb0" opacity="0.92" /><text x="382" y="244" font-family="Arial, sans-serif" font-size="11" fill="#fff">real glassbench closed loop blocked</text><text x="692" y="245" font-family="Arial, sans-serif" font-size="12">lit=0; real=1; micro=0; reject=0</text><text x="957" y="245" font-family="Arial, sans-serif" font-size="12">thermo claim=0</text><text x="372" y="271" font-family="Arial, sans-serif" font-size="10" fill="#555">claim: real signature support preinversion; blocker: physical time semantics</text><text x="72" y="303" font-family="Arial, sans-serif" font-size="12">sota thermodynamic boundary</text><rect x="372" y="286" width="292" height="24" fill="#805ad5" opacity="0.92" /><text x="382" y="302" font-family="Arial, sans-serif" font-size="11" fill="#fff">thermodynamic transition out of scope</text><text x="692" y="303" font-family="Arial, sans-serif" font-size="12">lit=1; real=0; micro=0; reject=0</text><text x="957" y="303" font-family="Arial, sans-serif" font-size="12">thermo claim=0</text><text x="372" y="329" font-family="Arial, sans-serif" font-size="10" fill="#555">claim: dynamical theory only; blocker: thermodynamic input law</text>
  <rect x="72" y="336" width="14" height="14" fill="#2f855a" /><text x="94" y="348" font-family="Arial, sans-serif" font-size="12">dynamic signatures supported</text>
  <rect x="314" y="336" width="14" height="14" fill="#276749" /><text x="336" y="348" font-family="Arial, sans-serif" font-size="12">mechanism protocol supported</text>
  <rect x="572" y="336" width="14" height="14" fill="#2b6cb0" /><text x="594" y="348" font-family="Arial, sans-serif" font-size="12">real closed loop blocked</text>
  <rect x="798" y="336" width="14" height="14" fill="#805ad5" /><text x="820" y="348" font-family="Arial, sans-serif" font-size="12">thermodynamic boundary</text>
</svg>
