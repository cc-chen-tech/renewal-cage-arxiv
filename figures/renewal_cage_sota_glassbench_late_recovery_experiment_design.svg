<svg xmlns="http://www.w3.org/2000/svg" width="1230" height="320" viewBox="0 0 1230 320">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="76" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700">GlassBench late-recovery experiment design</text>
  <text x="76" y="66" font-family="Arial, sans-serif" font-size="13" fill="#444">The public-window gap is converted into a minimal tc50 follow-up that can test Gaussian recovery and reject static disorder.</text>
  <text x="76" y="102" font-family="Arial, sans-serif" font-size="12" font-weight="700">target</text>
  <text x="281" y="102" font-family="Arial, sans-serif" font-size="12" font-weight="700">experiment stage</text>
  <text x="591" y="102" font-family="Arial, sans-serif" font-size="12" font-weight="700">minimum acquisition and decision rules</text>
  <text x="76" y="140" font-family="Arial, sans-serif" font-size="11" font-weight="700">KA2D T=0.23 structure 151</text><rect x="281" y="120" width="285" height="27" fill="#2b6cb0" opacity="0.92" /><text x="290" y="138" font-family="Arial, sans-serif" font-size="9.5" fill="#fff">minimal tc50 followup ready</text><text x="591" y="136" font-family="Arial, sans-serif" font-size="10.5">required=tc50; current=tc40; planned/min=3.86</text><text x="591" y="156" font-family="Arial, sans-serif" font-size="9.5" fill="#555">min lag=4.3e+07; planned lag=1.66e+08; blocker=public glassbench timecode ceiling</text><text x="591" y="176" font-family="Arial, sans-serif" font-size="9.5" fill="#555">observables=MSD;NGP;F_s(k,t);self_van_hove_tail;member_uncertainty</text><text x="591" y="196" font-family="Arial, sans-serif" font-size="9.5" fill="#555">rules: late NGP <= 0.05; late NGP + 2sigma < 0.1</text><text x="76" y="224" font-family="Arial, sans-serif" font-size="11" font-weight="700">KA2D T=0.30 structure 3</text><rect x="281" y="204" width="285" height="27" fill="#4a5568" opacity="0.92" /><text x="290" y="222" font-family="Arial, sans-serif" font-size="9.5" fill="#fff">finite exchange envelope upstream incomplet</text><text x="591" y="220" font-family="Arial, sans-serif" font-size="10.5">required=none; current=none; planned/min=0</text><text x="591" y="240" font-family="Arial, sans-serif" font-size="9.5" fill="#555">min lag=0; planned lag=0; blocker=finite exchange envelope</text><text x="591" y="260" font-family="Arial, sans-serif" font-size="9.5" fill="#555">observables=MSD;NGP;F_s(k,t);self_van_hove_tail;member_uncertainty</text><text x="591" y="280" font-family="Arial, sans-serif" font-size="9.5" fill="#555">rules: late NGP <= 0.05; late NGP + 2sigma < 0.1</text><text x="76" y="308" font-family="Arial, sans-serif" font-size="11" font-weight="700">KA2D T=0.30 structure none</text><rect x="281" y="288" width="285" height="27" fill="#4a5568" opacity="0.92" /><text x="290" y="306" font-family="Arial, sans-serif" font-size="9.5" fill="#fff">finite exchange envelope upstream incomplet</text><text x="591" y="304" font-family="Arial, sans-serif" font-size="10.5">required=none; current=none; planned/min=0</text><text x="591" y="324" font-family="Arial, sans-serif" font-size="9.5" fill="#555">min lag=0; planned lag=0; blocker=finite exchange envelope</text><text x="591" y="344" font-family="Arial, sans-serif" font-size="9.5" fill="#555">observables=MSD;NGP;F_s(k,t);self_van_hove_tail;member_uncertainty</text><text x="591" y="364" font-family="Arial, sans-serif" font-size="9.5" fill="#555">rules: late NGP <= 0.05; late NGP + 2sigma < 0.1</text>
</svg>
