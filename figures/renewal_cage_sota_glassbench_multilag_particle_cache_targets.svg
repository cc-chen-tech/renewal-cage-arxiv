  <text x="635" y="98" font-family="Arial, sans-serif" font-size="12" font-weight="700">structure-matched lag ladder</text>
  <text x="70" y="138" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="200" y="116" width="410" height="27" fill="#b7791f" opacity="0.92" /><text x="210" y="134" font-family="Arial, sans-serif" font-size="10" fill="#fff">official multi lag ladder ready cache missing</text><text x="635" y="136" font-family="Arial, sans-serif" font-size="11">structure=151; codes=tc05;tc10;tc15;tc20;tc25;tc30;tc35;tc40; members=8; cached=0</text><text x="635" y="158" font-family="Arial, sans-serif" font-size="10" fill="#555">lag span=1.5e+06; official ladder=1; particle ladder cache=0; event clock=0</text><text x="635" y="178" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=multi_lag_particle_cache_missing; next=extract structure matched multi lag npz members</text><text x="70" y="228" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="200" y="206" width="410" height="27" fill="#9f1239" opacity="0.92" /><text x="210" y="224" font-family="Arial, sans-serif" font-size="10" fill="#fff">official multi lag ladder incomplete</text><text x="635" y="226" font-family="Arial, sans-serif" font-size="11">structure=3; codes=tc01; members=1; cached=1</text><text x="635" y="248" font-family="Arial, sans-serif" font-size="10" fill="#555">lag span=0; official ladder=0; particle ladder cache=0; event clock=0</text><text x="635" y="268" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=official_multi_lag_semantics; next=extend official timecode member ladder</text>
</svg>
