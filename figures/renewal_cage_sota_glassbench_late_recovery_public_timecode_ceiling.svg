<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="400" viewBox="0 0 1220 400">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="76" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700">GlassBench public time-code ceiling</text>
  <text x="76" y="66" font-family="Arial, sans-serif" font-size="13" fill="#444">The required late-recovery target is compared with the published GlassBench time-code semantics before claiming reanalysis feasibility.</text>
  <text x="76" y="102" font-family="Arial, sans-serif" font-size="12" font-weight="700">target</text>
  <text x="206" y="102" font-family="Arial, sans-serif" font-size="12" font-weight="700">public ceiling stage</text>
  <text x="671" y="102" font-family="Arial, sans-serif" font-size="12" font-weight="700">published time-code support</text>
  <text x="76" y="142" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="206" y="120" width="438" height="27" fill="#b7791f" opacity="0.92" /><text x="216" y="138" font-family="Arial, sans-serif" font-size="10" fill="#fff">late recovery beyond public timecode ceiling</text><text x="671" y="140" font-family="Arial, sans-serif" font-size="11">structure=151; target=tc50; public max=tc40; structure max=tc40; published=0</text><text x="671" y="162" font-family="Arial, sans-serif" font-size="10" fill="#555">target lag=1.66e+08; public max lag=1.5e+06; target/public=111</text><text x="671" y="184" font-family="Arial, sans-serif" font-size="10" fill="#555">public codes=tc05;tc10;tc15;tc20;tc25;tc30;tc35;tc40</text><text x="671" y="206" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=public glassbench timecode ceiling; next=obtain new glassbench export or trajectory beyond tc40 for l</text><text x="76" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="206" y="228" width="438" height="27" fill="#4a5568" opacity="0.92" /><text x="216" y="246" font-family="Arial, sans-serif" font-size="10" fill="#fff">late recovery timecode target incomplete</text><text x="671" y="248" font-family="Arial, sans-serif" font-size="11">structure=3; target=none; public max=tc01; structure max=tc01; published=0</text><text x="671" y="270" font-family="Arial, sans-serif" font-size="10" fill="#555">target lag=0; public max lag=0.11; target/public=0</text><text x="671" y="292" font-family="Arial, sans-serif" font-size="10" fill="#555">public codes=tc01</text><text x="671" y="314" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=late recovery timecode target; next=complete late recovery timecode target</text><text x="76" y="358" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="206" y="336" width="438" height="27" fill="#4a5568" opacity="0.92" /><text x="216" y="354" font-family="Arial, sans-serif" font-size="10" fill="#fff">late recovery timecode target incomplete</text><text x="671" y="356" font-family="Arial, sans-serif" font-size="11">structure=none; target=none; public max=tc01; structure max=none; published=0</text><text x="671" y="378" font-family="Arial, sans-serif" font-size="10" fill="#555">target lag=0; public max lag=0.11; target/public=0</text><text x="671" y="400" font-family="Arial, sans-serif" font-size="10" fill="#555">public codes=tc01</text><text x="671" y="422" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=late recovery timecode target; next=complete late recovery timecode target</text>
