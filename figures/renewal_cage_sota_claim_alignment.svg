  <text x="707" y="80" font-family="Arial, sans-serif" font-size="12" font-weight="700">model/data status</text>
  <text x="75" y="117" font-family="Arial, sans-serif" font-size="11">kob1995vanhove</text><text x="260" y="117" font-family="Arial, sans-serif" font-size="11">cage plateau transient ngp van hove tail</text><rect x="575" y="101" width="110" height="22" fill="#2f855a" opacity="0.92" /><text x="587" y="116" font-family="Arial, sans-serif" font-size="11" fill="#fff">supported</text><text x="707" y="117" font-family="Arial, sans-serif" font-size="11">support: derived</text><text x="865" y="117" font-family="Arial, sans-serif" font-size="11">closure=0; fit=0</text><text x="1000" y="117" font-family="Arial, sans-serif" font-size="11">block: uncertainty columns</text><text x="260" y="136" font-family="Arial, sans-serif" font-size="9" fill="#555">binary Lennard-Jones cooling shows caging, non-Gaussian displacement structure, and van-Hove tails</text><text x="707" y="136" font-family="Arial, sans-serif" font-size="9" fill="#555">data: structural raw</text><text x="75" y="171" font-family="Arial, sans-serif" font-size="11">kob1995intermediate</text><text x="260" y="171" font-family="Arial, sans-serif" font-size="11">self intermediate scattering alpha relaxat</text><rect x="575" y="155" width="110" height="22" fill="#2f855a" opacity="0.92" /><text x="587" y="170" font-family="Arial, sans-serif" font-size="11" fill="#fff">supported</text><text x="707" y="171" font-family="Arial, sans-serif" font-size="11">support: derived</text><text x="865" y="171" font-family="Arial, sans-serif" font-size="11">closure=0; fit=0</text><text x="1000" y="171" font-family="Arial, sans-serif" font-size="11">block: uncertainty columns</text><text x="260" y="190" font-family="Arial, sans-serif" font-size="9" fill="#555">self-intermediate scattering has plateau and alpha relaxation with temperature-dependent shape</text><text x="707" y="190" font-family="Arial, sans-serif" font-size="9" fill="#555">data: structural raw</text><text x="75" y="225" font-family="Arial, sans-serif" font-size="11">hedges2007persistence</text><text x="260" y="225" font-family="Arial, sans-serif" font-size="11">persistence exchange decoupling</text><rect x="575" y="209" width="110" height="22" fill="#2f855a" opacity="0.92" /><text x="587" y="224" font-family="Arial, sans-serif" font-size="11" fill="#fff">supported</text><text x="707" y="225" font-family="Arial, sans-serif" font-size="11">support: derived</text><text x="865" y="225" font-family="Arial, sans-serif" font-size="11">closure=0; fit=0</text><text x="1000" y="225" font-family="Arial, sans-serif" font-size="11">block: machine readable joint curv</text><text x="260" y="244" font-family="Arial, sans-serif" font-size="9" fill="#555">persistence and exchange clocks decouple in atomistic glass formers</text><text x="707" y="244" font-family="Arial, sans-serif" font-size="9" fill="#555">data: qualitative</text><text x="75" y="279" font-family="Arial, sans-serif" font-size="11">lacevic2003fourpoint</text><text x="260" y="279" font-family="Arial, sans-serif" font-size="11">chi4 peak and dynamic length growth</text><rect x="575" y="263" width="110" height="22" fill="#2b6cb0" opacity="0.92" /><text x="587" y="278" font-family="Arial, sans-serif" font-size="11" fill="#fff">partial</text><text x="707" y="279" font-family="Arial, sans-serif" font-size="11">support: effective closure</text><text x="865" y="279" font-family="Arial, sans-serif" font-size="11">closure=1; fit=0</text><text x="1000" y="279" font-family="Arial, sans-serif" font-size="11">block: shared transport and four p</text><text x="260" y="298" font-family="Arial, sans-serif" font-size="9" fill="#555">four-point correlations reveal growing dynamic heterogeneity and a dynamic length scale</text><text x="707" y="298" font-family="Arial, sans-serif" font-size="9" fill="#555">data: qualitative</text><text x="75" y="333" font-family="Arial, sans-serif" font-size="11">berthier2024experimental</text><text x="260" y="333" font-family="Arial, sans-serif" font-size="11">experimental dynamic heterogeneity</text><rect x="575" y="317" width="110" height="22" fill="#2b6cb0" opacity="0.92" /><text x="587" y="332" font-family="Arial, sans-serif" font-size="11" fill="#fff">partial</text><text x="707" y="333" font-family="Arial, sans-serif" font-size="11">support: effective closure</text><text x="865" y="333" font-family="Arial, sans-serif" font-size="11">closure=1; fit=0</text><text x="1000" y="333" font-family="Arial, sans-serif" font-size="11">block: trajectory level chi4 input</text><text x="260" y="352" font-family="Arial, sans-serif" font-size="9" fill="#555">machine-learning transfer predicts dynamic heterogeneity near experimental glass transition</text><text x="707" y="352" font-family="Arial, sans-serif" font-size="9" fill="#555">data: qualitative</text><text x="75" y="387" font-family="Arial, sans-serif" font-size="11">guan2014fickian</text><text x="260" y="387" font-family="Arial, sans-serif" font-size="11">fickian non gaussian diffusion</text><rect x="575" y="371" width="110" height="22" fill="#2f855a" opacity="0.92" /><text x="587" y="386" font-family="Arial, sans-serif" font-size="11" fill="#fff">supported</text><text x="707" y="387" font-family="Arial, sans-serif" font-size="11">support: derived</text><text x="865" y="387" font-family="Arial, sans-serif" font-size="11">closure=0; fit=0</text><text x="1000" y="387" font-family="Arial, sans-serif" font-size="11">block: digitized uncertainty weigh</text><text x="260" y="406" font-family="Arial, sans-serif" font-size="9" fill="#555">hard-sphere colloids can be Fickian while retaining non-Gaussian displacement distributions</text><text x="707" y="406" font-family="Arial, sans-serif" font-size="9" fill="#555">data: qualitative</text><text x="75" y="441" font-family="Arial, sans-serif" font-size="11">angell1995formation</text><text x="260" y="441" font-family="Arial, sans-serif" font-size="11">fragility growth</text><rect x="575" y="425" width="110" height="22" fill="#2b6cb0" opacity="0.92" /><text x="587" y="440" font-family="Arial, sans-serif" font-size="11" fill="#fff">partial</text><text x="707" y="441" font-family="Arial, sans-serif" font-size="11">support: effective closure</text><text x="865" y="441" font-family="Arial, sans-serif" font-size="11">closure=1; fit=0</text><text x="1000" y="441" font-family="Arial, sans-serif" font-size="11">block: material specific barrier o</text><text x="260" y="460" font-family="Arial, sans-serif" font-size="9" fill="#555">fragile glass formers show rapidly growing apparent activation on cooling</text><text x="707" y="460" font-family="Arial, sans-serif" font-size="9" fill="#555">data: qualitative</text><text x="75" y="495" font-family="Arial, sans-serif" font-size="11">kauzmann1948nature;adam1965t</text><text x="260" y="495" font-family="Arial, sans-serif" font-size="11">configurational entropy and ideal glass sc</text><rect x="575" y="479" width="110" height="22" fill="#805ad5" opacity="0.92" /><text x="587" y="494" font-family="Arial, sans-serif" font-size="11" fill="#fff">scope boundary</text><text x="707" y="495" font-family="Arial, sans-serif" font-size="11">support: closure only</text><text x="865" y="495" font-family="Arial, sans-serif" font-size="11">closure=1; fit=0</text><text x="1000" y="495" font-family="Arial, sans-serif" font-size="11">block: thermodynamic input law</text><text x="260" y="514" font-family="Arial, sans-serif" font-size="9" fill="#555">entropy extrapolation and Adam-Gibbs relaxation connect thermodynamics to slowdown</text><text x="707" y="514" font-family="Arial, sans-serif" font-size="9" fill="#555">data: qualitative</text>
