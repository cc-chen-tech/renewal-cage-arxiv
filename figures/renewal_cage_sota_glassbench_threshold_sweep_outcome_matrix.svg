<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="350" viewBox="0 0 1160 350">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="75" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700">GlassBench threshold-sweep outcome matrix</text>
  <text x="75" y="66" font-family="Arial, sans-serif" font-size="13" fill="#444">Pass and fail interpretations are preregistered before the missing payload is acquired, keeping the result falsifiable rather than post-hoc.</text>
  <text x="75" y="102" font-family="Arial, sans-serif" font-size="12" font-weight="700">target</text>
  <text x="205" y="102" font-family="Arial, sans-serif" font-size="12" font-weight="700">outcome stage</text>
  <text x="620" y="102" font-family="Arial, sans-serif" font-size="12" font-weight="700">preregistered decision rule</text>
  <text x="75" y="142" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="205" y="120" width="390" height="27" fill="#c05621" opacity="0.92" /><text x="215" y="138" font-family="Arial, sans-serif" font-size="10" fill="#fff">awaiting event rule preregistered outcome</text><text x="620" y="140" font-family="Arial, sans-serif" font-size="11">required=nonrecrossing event definition on true time axis</text><text x="620" y="162" font-family="Arial, sans-serif" font-size="10" fill="#555">pass: mean persistence sensitivity ratio <= 1.5 and max post crossing recross fraction <= 0.</text><text x="620" y="182" font-family="Arial, sans-serif" font-size="10" fill="#555">pass claim=threshold robust event clock candidate not pe inversion; fail claim=fixed lag threshold event clock rejected</text><text x="620" y="202" font-family="Arial, sans-serif" font-size="10" fill="#555">scope=dynamical event clock diagnostic only; thermodynamic claim=0</text><text x="75" y="238" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="205" y="216" width="390" height="27" fill="#805ad5" opacity="0.92" /><text x="215" y="234" font-family="Arial, sans-serif" font-size="10" fill="#fff">awaiting payload preregistered outcome</text><text x="620" y="236" font-family="Arial, sans-serif" font-size="11">required=multi lag threshold sweep on physical time axis</text><text x="620" y="258" font-family="Arial, sans-serif" font-size="10" fill="#555">pass: mean persistence sensitivity ratio <= 1.5 and max post crossing recross fraction <= 0.</text><text x="620" y="278" font-family="Arial, sans-serif" font-size="10" fill="#555">pass claim=threshold robust event clock candidate not pe inversion; fail claim=fixed lag threshold event clock rejected</text><text x="620" y="298" font-family="Arial, sans-serif" font-size="10" fill="#555">scope=dynamical event clock diagnostic only; thermodynamic claim=0</text>
</svg>
