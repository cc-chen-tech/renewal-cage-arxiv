  <text x="75" y="141" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="205" y="119" width="445" height="27" fill="#9f1239" opacity="0.92" /><text x="215" y="137" font-family="Arial, sans-serif" font-size="10" fill="#fff">segmentation target ready true event clock missing</text><text x="675" y="139" font-family="Arial, sans-serif" font-size="11">structure=151; q_max=0.486; PE=1; tail=1; target=1; true-time=0; requires true trajectory=1</text><text x="675" y="161" font-family="Arial, sans-serif" font-size="10" fill="#555">ever crossed=0.24; tail above bound=0.235; first-cross q/q_max=3.44</text><text x="675" y="183" font-family="Arial, sans-serif" font-size="10" fill="#555">required=positions[time,particle,dimension]; time_or_lag; trajectory_id; box_or_unwrapped_p</text><text x="675" y="203" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=physical time trajectory axis; next=extract positions time particle dimension before pe </text><text x="75" y="246" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="205" y="224" width="445" height="27" fill="#4a5568" opacity="0.92" /><text x="215" y="242" font-family="Arial, sans-serif" font-size="10" fill="#fff">event clock contract upstream incomplete</text><text x="675" y="244" font-family="Arial, sans-serif" font-size="11">structure=none; q_max=0; PE=0; tail=0; target=0; true-time=0; requires true trajectory=0</text><text x="675" y="266" font-family="Arial, sans-serif" font-size="10" fill="#555">ever crossed=0; tail above bound=0; first-cross q/q_max=0</text><text x="675" y="288" font-family="Arial, sans-serif" font-size="10" fill="#555">required=positions[time,particle,dimension]; time_or_lag; trajectory_id; box_or_unwrapped_p</text><text x="675" y="308" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=pe feasibility bound; next=complete direct alpha pe feasibility bound</text>
