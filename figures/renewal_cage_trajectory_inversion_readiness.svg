  <text x="80" y="127" font-family="Arial, sans-serif" font-size="12">synthetic intermittent trajectory uncertaint</text><rect x="410" y="110" width="230" height="24" fill="#2f855a" opacity="0.92" /><text x="422" y="126" font-family="Arial, sans-serif" font-size="11" fill="#fff">uncertainty weighted trajectory inve</text><text x="670" y="127" font-family="Arial, sans-serif" font-size="12">lags=4; structural=1; uncertainty=1</text><text x="410" y="154" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker: none</text><text x="670" y="154" font-family="Arial, sans-serif" font-size="10" fill="#555">missing sigma: none</text><text x="80" y="209" font-family="Arial, sans-serif" font-size="12">synthetic intermittent trajectory structural</text><rect x="410" y="192" width="230" height="24" fill="#2b6cb0" opacity="0.92" /><text x="422" y="208" font-family="Arial, sans-serif" font-size="11" fill="#fff">structural trajectory only</text><text x="670" y="209" font-family="Arial, sans-serif" font-size="12">lags=4; structural=1; uncertainty=0</text><text x="410" y="236" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker: sigma msd</text><text x="670" y="236" font-family="Arial, sans-serif" font-size="10" fill="#555">missing sigma: sigma msd;sigma ngp;sigma self intermediate scattering;sig</text>
