<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="430" viewBox="0 0 1160 430">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="75" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700">GlassBench four-member frame-index observables</text>
  <text x="75" y="66" font-family="Arial, sans-serif" font-size="13" fill="#444">The first four indexed KA2D trajectory members are extracted and aggregated into observable means with standard errors.</text>
  <text x="75" y="94" font-family="Arial, sans-serif" font-size="12" font-weight="700">target</text>
  <text x="195" y="94" font-family="Arial, sans-serif" font-size="12" font-weight="700">uncertainty stage</text>
  <text x="560" y="94" font-family="Arial, sans-serif" font-size="12" font-weight="700">frame-index observables</text>
  <text x="75" y="135" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="195" y="114" width="340" height="26" fill="#2b6cb0" opacity="0.92" /><text x="205" y="131" font-family="Arial, sans-serif" font-size="10" fill="#fff">frame index member ensemble uncertainty ready</text><text x="560" y="133" font-family="Arial, sans-serif" font-size="11">members=4; MSD=0.0070857 +/- 0.0031; chi4=161.88 +/- 52.90</text><text x="560" y="152" font-family="Arial, sans-serif" font-size="10" fill="#555">frame=1; Fs(k)=0.999132623291;0.997860348764;0.99548198; blocker=physical_time_semantics</text><text x="560" y="170" font-family="Arial, sans-serif" font-size="10" fill="#555">next: attach physical lag time and units</text><text x="75" y="211" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="195" y="190" width="340" height="26" fill="#2b6cb0" opacity="0.92" /><text x="205" y="207" font-family="Arial, sans-serif" font-size="10" fill="#fff">frame index member ensemble uncertainty ready</text><text x="560" y="209" font-family="Arial, sans-serif" font-size="11">members=4; MSD=0.0056384 +/- 5.3e-05; chi4=179.47 +/- 2.50</text><text x="560" y="228" font-family="Arial, sans-serif" font-size="10" fill="#555">frame=1; Fs(k)=0.999309552953;0.998295928666;0.99639829; blocker=physical_time_semantics</text><text x="560" y="246" font-family="Arial, sans-serif" font-size="10" fill="#555">next: attach physical lag time and units</text>
  <rect x="75" y="358" width="14" height="14" fill="#2b6cb0" /><text x="96" y="370" font-family="Arial, sans-serif" font-size="12">four-member observable uncertainty ready in frame-index coordinates</text>
  <text x="75" y="394" font-family="Arial, sans-serif" font-size="12">Physical lag time is still absent, so the gate does not enable real persistence/exchange inversion or thermodynamic claims.</text>
