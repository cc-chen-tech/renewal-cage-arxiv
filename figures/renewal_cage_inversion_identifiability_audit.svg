<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="600" viewBox="0 0 1160 600">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="70" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700">Inversion identifiability audit</text>
  <text x="70" y="66" font-family="Arial, sans-serif" font-size="13" fill="#444">Each inversion protocol is checked for fit-rank margin, held-out predictions, closure dependence, and explicit parameter degeneracy.</text>
  <text x="70" y="83" font-family="Arial, sans-serif" font-size="12" font-weight="700">protocol</text>
  <text x="385" y="83" font-family="Arial, sans-serif" font-size="12" font-weight="700">identifiability class</text>
  <text x="595" y="83" font-family="Arial, sans-serif" font-size="12" font-weight="700">pre-fit audit counts</text>
  <text x="70" y="121" font-family="Arial, sans-serif" font-size="11">scattering transport inversion</text><rect x="385" y="101" width="190" height="22" fill="#2f855a" opacity="0.92" /><text x="393" y="116" font-family="Arial, sans-serif" font-size="10" fill="#fff">identifiable prediction</text><text x="595" y="121" font-family="Arial, sans-serif" font-size="11">fit=3; params=3; margin=0; held=3; closure=0; risk=0</text><text x="140" y="139" font-family="Arial, sans-serif" font-size="9" fill="#555">parameters: cage variance;jump variance;renewal rate</text><text x="595" y="139" font-family="Arial, sans-serif" font-size="9" fill="#555">held-out: ngp peak height;ngp peak time;late gaussian recovery</text><text x="70" y="179" font-family="Arial, sans-serif" font-size="11">full observable inversion</text><rect x="385" y="159" width="190" height="22" fill="#2f855a" opacity="0.92" /><text x="393" y="174" font-family="Arial, sans-serif" font-size="10" fill="#fff">identifiable prediction</text><text x="595" y="179" font-family="Arial, sans-serif" font-size="11">fit=4; params=4; margin=0; held=2; closure=0; risk=0</text><text x="140" y="197" font-family="Arial, sans-serif" font-size="9" fill="#555">parameters: cage variance;jump variance;renewal rate;renewal delay</text><text x="595" y="197" font-family="Arial, sans-serif" font-size="9" fill="#555">held-out: tau alpha;multi k alpha shape</text><text x="70" y="237" font-family="Arial, sans-serif" font-size="11">joint persistence exchange multik chi4</text><rect x="385" y="217" width="190" height="22" fill="#2f855a" opacity="0.92" /><text x="393" y="232" font-family="Arial, sans-serif" font-size="10" fill="#fff">identifiable prediction</text><text x="595" y="237" font-family="Arial, sans-serif" font-size="11">fit=2; params=2; margin=0; held=4; closure=0; risk=0</text><text x="140" y="255" font-family="Arial, sans-serif" font-size="9" fill="#555">parameters: exchange time;persistence time</text><text x="595" y="255" font-family="Arial, sans-serif" font-size="9" fill="#555">held-out: multi k tau alpha;late ngp;stokes einstein product;chi4 peak proxy</text><text x="70" y="295" font-family="Arial, sans-serif" font-size="11">single alpha fit only null</text><rect x="385" y="275" width="190" height="22" fill="#c05621" opacity="0.92" /><text x="393" y="290" font-family="Arial, sans-serif" font-size="10" fill="#fff">underidentified fit</text><text x="595" y="295" font-family="Arial, sans-serif" font-size="11">fit=1; params=2; margin=-1; held=0; closure=0; risk=1</text><text x="140" y="313" font-family="Arial, sans-serif" font-size="9" fill="#555">parameters: exchange time;persistence time</text><text x="595" y="313" font-family="Arial, sans-serif" font-size="9" fill="#555">held-out: none</text><text x="70" y="353" font-family="Arial, sans-serif" font-size="11">static vs finite exchange late window</text><rect x="385" y="333" width="190" height="22" fill="#c53030" opacity="0.92" /><text x="393" y="348" font-family="Arial, sans-serif" font-size="10" fill="#fff">degenerate fit</text><text x="595" y="353" font-family="Arial, sans-serif" font-size="11">fit=3; params=2; margin=1; held=1; closure=0; risk=1</text><text x="140" y="371" font-family="Arial, sans-serif" font-size="9" fill="#555">parameters: static shape;exchange ratio</text><text x="595" y="371" font-family="Arial, sans-serif" font-size="9" fill="#555">held-out: gaussian recovery class</text><text x="70" y="411" font-family="Arial, sans-serif" font-size="11">spatial chi4 front closure</text><rect x="385" y="391" width="190" height="22" fill="#2b6cb0" opacity="0.92" /><text x="393" y="406" font-family="Arial, sans-serif" font-size="10" fill="#fff">conditionally identifiable</text><text x="595" y="411" font-family="Arial, sans-serif" font-size="11">fit=3; params=2; margin=1; held=1; closure=1; risk=0</text><text x="140" y="429" font-family="Arial, sans-serif" font-size="9" fill="#555">parameters: correlation length;front diffusivity</text><text x="595" y="429" font-family="Arial, sans-serif" font-size="9" fill="#555">held-out: dynamic length</text><text x="70" y="469" font-family="Arial, sans-serif" font-size="11">thermodynamic entropy boundary</text><rect x="385" y="449" width="190" height="22" fill="#805ad5" opacity="0.92" /><text x="393" y="464" font-family="Arial, sans-serif" font-size="10" fill="#fff">scope boundary</text><text x="595" y="469" font-family="Arial, sans-serif" font-size="11">fit=2; params=2; margin=0; held=2; closure=1; risk=0</text><text x="140" y="487" font-family="Arial, sans-serif" font-size="9" fill="#555">parameters: kauzmann temperature;entropy slope</text><text x="595" y="487" font-family="Arial, sans-serif" font-size="9" fill="#555">held-out: heat capacity anomaly;ideal glass transition</text>
  <rect x="70" y="550" width="14" height="14" fill="#2f855a" /><text x="92" y="562" font-family="Arial, sans-serif" font-size="12">identifiable with held-out predictions</text>
  <rect x="325" y="550" width="14" height="14" fill="#2b6cb0" /><text x="347" y="562" font-family="Arial, sans-serif" font-size="12">closure-assisted</text>
  <rect x="500" y="550" width="14" height="14" fill="#c05621" /><text x="522" y="562" font-family="Arial, sans-serif" font-size="12">underidentified</text>
  <rect x="665" y="550" width="14" height="14" fill="#c53030" /><text x="687" y="562" font-family="Arial, sans-serif" font-size="12">degenerate fit</text>
  <rect x="820" y="550" width="14" height="14" fill="#805ad5" /><text x="842" y="562" font-family="Arial, sans-serif" font-size="12">scope boundary</text>
</svg>
