<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="420" viewBox="0 0 1160 420">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="75" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700">GlassBench frame-time mapping audit</text>
  <text x="75" y="67" font-family="Arial, sans-serif" font-size="13" fill="#444">Result time grids are not attached to trajectory frame indices unless a publishable mapping class is documented.</text>
  <text x="75" y="88" font-family="Arial, sans-serif" font-size="12" font-weight="700">target</text>
  <text x="203" y="88" font-family="Arial, sans-serif" font-size="12" font-weight="700">mapping audit stage</text>
  <text x="560" y="88" font-family="Arial, sans-serif" font-size="12" font-weight="700">candidate checks</text>
  <text x="75" y="129" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="203" y="107" width="330" height="27" fill="#c05621" opacity="0.92" /><text x="213" y="125" font-family="Arial, sans-serif" font-size="10" fill="#fff">ambiguous frame time mapping</text><text x="560" y="125" font-family="Arial, sans-serif" font-size="11">ready=0; exact=0; integer stride=0; endpoint interpolation=1; ratio=2.71</text><text x="203" y="152" font-family="Arial, sans-serif" font-size="9" fill="#555">accepted: none; provisional: endpoint interpolation requires metadata</text><text x="203" y="170" font-family="Arial, sans-serif" font-size="9" fill="#555">metadata: dump interval;saved frame stride;trajectory frame origin;result time generation script</text><text x="75" y="205" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="203" y="183" width="330" height="27" fill="#c05621" opacity="0.92" /><text x="213" y="201" font-family="Arial, sans-serif" font-size="10" fill="#fff">ambiguous frame time mapping</text><text x="560" y="201" font-family="Arial, sans-serif" font-size="11">ready=0; exact=0; integer stride=0; endpoint interpolation=1; ratio=3.8</text><text x="203" y="228" font-family="Arial, sans-serif" font-size="9" fill="#555">accepted: none; provisional: endpoint interpolation requires metadata</text><text x="203" y="246" font-family="Arial, sans-serif" font-size="9" fill="#555">metadata: dump interval;saved frame stride;trajectory frame origin;result time generation script</text>
  <rect x="75" y="360" width="14" height="14" fill="#c05621" /><text x="96" y="372" font-family="Arial, sans-serif" font-size="12">endpoint interpolation alone is not a publishable frame-time mapping</text>
  <rect x="645" y="360" width="14" height="14" fill="#2f855a" /><text x="666" y="372" font-family="Arial, sans-serif" font-size="12">green requires explicit count-matched or explicit stride metadata</text>
