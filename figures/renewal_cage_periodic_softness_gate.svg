<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="440" viewBox="0 0 1120 440">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="75" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700">Periodic cage potential with two softness gates</text>
  <text x="75" y="68" font-family="Arial, sans-serif" font-size="13" fill="#444">Vorselaars-style periodic cage potential supplies the Langevin/Kramers baseline; two slow precursor gates multiply the escape rate.</text>
  <text x="75" y="92" font-family="Arial, sans-serif" font-size="13" fill="#444">Result: r(t)=lambda[1-exp(-t/tau_d)]^2 and R(t)=lambda tau_d F(t/tau_d), while the many-body origin of the gates remains a coarse-grained assumption.</text>
  <text x="75" y="91" font-family="Arial, sans-serif" font-size="12" font-weight="700">state</text>
  <text x="170" y="91" font-family="Arial, sans-serif" font-size="12" font-weight="700">precursor build-up time</text>
  <text x="75" y="135" font-family="Arial, sans-serif" font-size="12" font-weight="700">T=0.85</text><rect x="170" y="116" width="150.00" height="20" fill="#2b6cb0" opacity="0.84" /><text x="610" y="132" font-family="Arial, sans-serif" font-size="12">tau_d=2.50; k_K=0.1609; r(tau_d)=0.0643</text><text x="170" y="159" font-family="Arial, sans-serif" font-size="10" fill="#555">period=1.15; curvature=28.36; assumption: collective_softness_precursors_and_effective_periodic_potential</text><text x="75" y="223" font-family="Arial, sans-serif" font-size="12" font-weight="700">T=0.65</text><rect x="170" y="204" width="420.00" height="20" fill="#c05621" opacity="0.84" /><text x="610" y="220" font-family="Arial, sans-serif" font-size="12">tau_d=8.00; k_K=0.03357; r(tau_d)=0.01342</text><text x="170" y="247" font-family="Arial, sans-serif" font-size="10" fill="#555">period=1.15; curvature=40.30; assumption: collective_softness_precursors_and_effective_periodic_potential</text>
  <text x="75" y="350" font-family="Arial, sans-serif" font-size="12" fill="#444">Potential family: U(x)=DeltaU[1-cos(2 pi x/L)]/2 plus two collective softness gates p_i(t)=1-exp(-t/tau_d).</text>
  <text x="75" y="372" font-family="Arial, sans-serif" font-size="12" fill="#444">Boundary: this is more microscopic than a hand-set hazard, but it is still an effective collective-coordinate model, not a complete many-body derivation.</text>
</svg>
