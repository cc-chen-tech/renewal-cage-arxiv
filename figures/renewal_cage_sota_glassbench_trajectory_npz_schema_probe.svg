  <text x="75" y="128" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA T=none</text><rect x="195" y="108" width="320" height="24" fill="#c05621" opacity="0.92" /><text x="205" y="124" font-family="Arial, sans-serif" font-size="10" fill="#fff">trajectory inner tar layout incomplete</text><text x="535" y="127" font-family="Arial, sans-serif" font-size="11">schema=0; coords=0; shape=0x0x0; extract=0; blocker=trajectory payload</text><text x="195" y="154" font-family="Arial, sans-serif" font-size="9" fill="#555">member: none</text><text x="195" y="168" font-family="Arial, sans-serif" font-size="9" fill="#555">arrays: none</text><text x="75" y="200" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="195" y="180" width="320" height="24" fill="#2b6cb0" opacity="0.92" /><text x="205" y="196" font-family="Arial, sans-serif" font-size="10" fill="#fff">trajectory npz coordinate schema verified</text><text x="535" y="199" font-family="Arial, sans-serif" font-size="11">schema=1; coords=1; shape=20x1290x2; extract=0; blocker=full npz ensemble extraction policy</text><text x="195" y="226" font-family="Arial, sans-serif" font-size="9" fill="#555">member: T0.23/test/N1290T0.23_202_tc05.npz</text><text x="195" y="240" font-family="Arial, sans-serif" font-size="9" fill="#555">arrays: box.npy;types.npy;initial_positions.npy;initial_positions_inherent.npy;positions.npy</text><text x="75" y="272" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="195" y="252" width="320" height="24" fill="#2b6cb0" opacity="0.92" /><text x="205" y="268" font-family="Arial, sans-serif" font-size="10" fill="#fff">trajectory npz coordinate schema verified</text><text x="535" y="271" font-family="Arial, sans-serif" font-size="11">schema=1; coords=1; shape=20x1290x2; extract=0; blocker=full npz ensemble extraction policy</text><text x="195" y="298" font-family="Arial, sans-serif" font-size="9" fill="#555">memb