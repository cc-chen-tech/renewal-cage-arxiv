  <text x="75" y="66" font-family="Arial, sans-serif" font-size="13" fill="#444">KA I/II fused validation needs machine-readable observable columns plus uncertainty columns before quantitative inversion.</text>
  <text x="95" y="123.00" font-family="Arial, sans-serif" font-size="12">ka self intermediate scattering</text><rect x="390" y="107.00" width="130" height="22" fill="#2b6cb0" opacity="0.9" /><text x="402" y="122.00" font-family="Arial, sans-serif" font-size="11" fill="#fff">struct/unc=1/0</text><text x="550" y="123.00" font-family="Arial, sans-serif" font-size="12">diagnostic: multi k alpha shape</text><text x="815" y="123.00" font-family="Arial, sans-serif" font-size="12">block: sigma_F_s</text><text x="215" y="143.00" font-family="Arial, sans-serif" font-size="10" fill="#555">missing uncertainty: sigma_F_s</text><text x="95" y="198.00" font-family="Arial, sans-serif" font-size="12">ka van hove ngp</text><rect x="390" y="182.00" width="130" height="22" fill="#2b6cb0" opacity="0.9" /><text x="402" y="197.00" font-family="Arial, sans-serif" font-size="11" fill="#fff">struct/unc=1/0</text><text x="550" y="198.00" font-family="Arial, sans-serif" font-size="12">diagnostic: van hove gaussian recovery</text><text x="815" y="198.00" font-family="Arial, sans-serif" font-size="12">block: sigma_G_s</text><text x="215" y="218.00" font-family="Arial, sans-serif" font-size="10" fill="#555">missing uncertainty: sigma_G_s;sigma_alpha2;sigma_diffusion</text><text x="95" y="273.00" font-family="Arial, sans-serif" font-size="12">ka joint transport alpha</text><rect x="390" y="257.00" width="130" height="22" fill="#2b6cb0" opacity="0.9" /><text x="402" y="272.00" font-family="Arial, sans-serif" font-size="11" fill="#fff">struct/unc=1/0</text><text x="550" y="273.00" font-family="Arial, sans-serif" font-size="12">diagnostic: stokes einstein and tts</text><text x="815" y="273.00" font-family="Arial, sans-serif" font-size="12">block: sigma_tau_alpha</text><text x="215" y="293.00" font-family="Arial, sans-serif" font-size="10" fill="#555">missing uncertainty: sigma_tau_alpha;sigma_diffusion;sigma_alpha_shape_residual</text>
