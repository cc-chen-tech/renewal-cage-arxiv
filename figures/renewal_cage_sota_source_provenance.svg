  <text x="75" y="121" font-family="Arial, sans-serif" font-size="11">glassbench zenodo trajectory release</text><rect x="405" y="101" width="235" height="24" fill="#2f855a" opacity="0.92" /><text x="415" y="117" font-family="Arial, sans-serif" font-size="10" fill="#fff">trajectory reanalysis source</text><text x="665" y="120" font-family="Arial, sans-serif" font-size="11">traj=1; raw=0; digitize=0; blocker=none</text><text x="145" y="143" font-family="Arial, sans-serif" font-size="9" fill="#555">provenance: doi;repository url;machine readable files;raw particle trajectories;simulation protocol metadata</text><text x="75" y="189" font-family="Arial, sans-serif" font-size="11">hedges persistence exchange jcp article</text><rect x="405" y="169" width="235" height="24" fill="#718096" opacity="0.92" /><text x="415" y="185" font-family="Arial, sans-serif" font-size="10" fill="#fff">citation only source</text><text x="665" y="188" font-family="Arial, sans-serif" font-size="11">traj=0; raw=0; digitize=1; blocker=machine readable files</text><text x="145" y="211" font-family="Arial, sans-serif" font-size="9" fill="#555">provenance: doi;published figures</text><text x="75" y="257" font-family="Arial, sans-serif" font-size="11">kauzmann entropy thermodynamic boundary</text><rect x="405" y="237" width="235" height="24" fill="#805ad5" opacity="0.92" /><text x="415" y="253" font-family="Arial, sans-serif" font-size="10" fill="#fff">scope boundary source</text><text x="665" y="256" font-family="Arial, sans-serif" font-size="11">traj=0; raw=0; digitize=0; blocker=renewal dynamics not thermodynamic theory</text><text x="145" y="279" font-family="Arial, sans-serif" font-size="9" fill="#555">provenance: doi;published figures;thermodynamic observables</text>
