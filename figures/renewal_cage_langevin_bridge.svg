<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="75" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700">Langevin to renewal-cage bridge</text>
  <text x="75" y="66" font-family="Arial, sans-serif" font-size="13" fill="#444">Overdamped Langevin/Smoluchowski dynamics gives Einstein diffusion, OU cage variance, and Kramers escape rates; metastable basin and barrier inputs remain explicit assumptions.</text>
  <text x="75" y="83" font-family="Arial, sans-serif" font-size="12" font-weight="700">state</text>
  <text x="170" y="83" font-family="Arial, sans-serif" font-size="12" font-weight="700">persistence/exchange decoupling</text>
  <text x="75" y="130" font-family="Arial, sans-serif" font-size="12" font-weight="700">T=0.85</text><rect x="170" y="110" width="65.00" height="20" fill="#2b6cb0" opacity="0.86" /><text x="560" y="126" font-family="Arial, sans-serif" font-size="12">tau_p/tau_x=1.00; D tau_alpha=1.13; whole-theory Langevin claim=0</text><text x="170" y="153" font-family="Arial, sans-serif" font-size="10" fill="#555">barriers: base=2.00, persistence=2.25, exchange=2.25; assumption: metastable_basin_partition_and_barrier_inputs</text><text x="75" y="216" font-family="Arial, sans-serif" font-size="12" font-weight="700">T=0.65</text><rect x="170" y="196" width="353.08" height="20" fill="#c05621" opacity="0.86" /><text x="560" y="212" font-family="Arial, sans-serif" font-size="12">tau_p/tau_x=5.43; D tau_alpha=2.40; whole-theory Langevin claim=0</text><text x="170" y="239" font-family="Arial, sans-serif" font-size="10" fill="#555">barriers: base=2.60, persistence=3.95, exchange=2.85; assumption: metastable_basin_partition_and_barrier_inputs</text>
  <text x="75" y="344" font-family="Arial, sans-serif" font-size="12" fill="#444">Derived effective layer: cage variance=T/kappa, cage tau=gamma/kappa, k= sqrt(kappa |k_s|)/(2 pi gamma) exp(-Delta F/T), then tau_p=1/k_p and tau_x=1/k_x.</text>
  <text x="75" y="366" font-family="Arial, sans-serif" font-size="12" fill="#444">Boundary: only the intra-cage OU layer and local Kramers escape clocks are Langevin-derived; delayed renewal remains a coarse-grained input.</text>
</svg>
