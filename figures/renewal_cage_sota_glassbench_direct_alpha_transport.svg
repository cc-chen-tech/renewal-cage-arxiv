  <text x="660" y="96" font-family="Arial, sans-serif" font-size="12" font-weight="700">matched alpha/transport proxy</text>
  <text x="75" y="136" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="205" y="114" width="430" height="27" fill="#7c2d12" opacity="0.92" /><text x="215" y="132" font-family="Arial, sans-serif" font-size="10" fill="#fff">cached direct alpha transport proxy ready event clock blocked</text><text x="660" y="134" font-family="Arial, sans-serif" font-size="11">structure=151; crossing=tc40; tau_alpha=1.5e+06; MSD=0.975</text><text x="660" y="156" font-family="Arial, sans-serif" font-size="10" fill="#555">D_eff=1.62e-07; D_eff tau_alpha=0.244; NGP=2.12; proxy=1</text><text x="660" y="176" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=event clock trajectory; next=extract particle event clock for persistence exchange </text><text x="75" y="224" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="205" y="202" width="430" height="27" fill="#4a5568" opacity="0.92" /><text x="215" y="220" font-family="Arial, sans-serif" font-size="10" fill="#fff">direct alpha crossing upstream incomplete</text><text x="660" y="222" font-family="Arial, sans-serif" font-size="11">structure=none; crossing=none; tau_alpha=0; MSD=0</text><text x="660" y="244" font-family="Arial, sans-serif" font-size="10" fill="#555">D_eff=0; D_eff tau_alpha=0; NGP=0; proxy=0</text><text x="660" y="264" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=direct alpha threshold crossing; next=complete direct alpha curve threshold crossing</text>
