  <text x="75" y="127" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="205" y="108" width="345" height="24" fill="#c05621" opacity="0.92" /><text x="215" y="124" font-family="Arial, sans-serif" font-size="10" fill="#fff">trajectory result timebase length mismatch</text><text x="575" y="124" font-family="Arial, sans-serif" font-size="11">ready=0; frames=20; time points=8; count match=0; explicit mapping=0</text><text x="205" y="148" font-family="Arial, sans-serif" font-size="9" fill="#555">time grid: GlassBench/KA2D_results/times_0.23.dat; next: derive or fetch trajectory frame time mapping</text><text x="75" y="193" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="205" y="174" width="345" height="24" fill="#c05621" opacity="0.92" /><text x="215" y="190" font-family="Arial, sans-serif" font-size="10" fill="#fff">trajectory result timebase length mismatch</text><text x="575" y="190" font-family="Arial, sans-serif" font-size="11">ready=0; frames=20; time points=6; count match=0; explicit mapping=0</text><text x="205" y="214" font-family="Arial, sans-serif" font-size="9" fill="#555">time grid: GlassBench/KA2D_results/times_0.30.dat; next: derive or fetch trajectory frame time mapping</text>
