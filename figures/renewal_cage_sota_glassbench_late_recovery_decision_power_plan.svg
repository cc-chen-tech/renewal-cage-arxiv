  <text x="76" y="139" font-family="Arial, sans-serif" font-size="10.5" font-weight="700">KA2D T=0.23 s=151 tc50</text><text x="76" y="159" font-family="Arial, sans-serif" font-size="9.5" fill="#555">low late ngp gaussian recovery</text><rect x="326" y="119" width="300" height="26" fill="#2f855a" opacity="0.92" /><text x="335" y="137" font-family="Arial, sans-serif" font-size="8.8" fill="#fff">decision power sufficient</text><text x="651" y="136" font-family="Arial, sans-serif" font-size="10">members current/required/additional = 8/8/0; multiplier=1</text><text x="651" y="156" font-family="Arial, sans-serif" font-size="9.5" fill="#555">sigma late NGP current/required = 0.0015/0.0015</text><text x="651" y="176" font-family="Arial, sans-serif" font-size="9.5" fill="#555">blocker=none; next=record tc50 observation and apply preregistered verdict</text><text x="76" y="205" font-family="Arial, sans-serif" font-size="10.5" font-weight="700">KA2D T=0.23 s=151 tc50</text><text x="76" y="225" font-family="Arial, sans-serif" font-size="9.5" fill="#555">high late ngp or missing recovery</text><rect x="326" y="185" width="300" height="26" fill="#2f855a" opacity="0.92" /><text x="335" y="203" font-family="Arial, sans-serif" font-size="8.8" fill="#fff">decision power sufficient</text><text x="651" y="202" font-family="Arial, sans-serif" font-size="10">members current/required/additional = 8/8/0; multiplier=1</text><text x="651" y="222" font-family="Arial, sans-serif" font-size="9.5" fill="#555">sigma late NGP current/required = 0.003/0.003</text><text x="651" y="242" font-family="Arial, sans-serif" font-size="9.5" fill="#555">blocker=none; next=record tc50 observation and apply preregistered verdict</text><text x="76" y="271" font-family="Arial, sans-serif" font-size="10.5" font-weight="700">KA2D T=0.23 s=151 tc50</text><text x="76" y="291" font-family="Arial, sans-serif" font-size="9.5" fill="#555">wide uncertainty requires more data</text><rect x="326" y="251" width="300" heigh