<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="350" viewBox="0 0 1220 350">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="75" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700">GlassBench cached-particle time-code bridge</text>
  <text x="75" y="66" font-family="Arial, sans-serif" font-size="13" fill="#444">Cached first-NPZ coordinates have official lag times, but their axis 0 is isoconfigurational replicas rather than a physical-time trajectory.</text>
  <text x="75" y="96" font-family="Arial, sans-serif" font-size="12" font-weight="700">target</text>
  <text x="205" y="96" font-family="Arial, sans-serif" font-size="12" font-weight="700">time-code bridge stage</text>
  <text x="660" y="96" font-family="Arial, sans-serif" font-size="12" font-weight="700">lag-time and axis semantics</text>
  <text x="75" y="136" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="205" y="114" width="430" height="27" fill="#b7791f" opacity="0.92" /><text x="215" y="132" font-family="Arial, sans-serif" font-size="10" fill="#fff">cached particle lag time ready event clock blocked</text><text x="660" y="134" font-family="Arial, sans-serif" font-size="11">time code=tc05; lag=0.1; cache=1; lag ready=1</text><text x="660" y="156" font-family="Arial, sans-serif" font-size="10" fill="#555">axis0=isoconfigurational trajectory replicates; frame-axis time=0; event clock=0</text><text x="660" y="176" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=frame_axis_is_isoconfigurational_replicates; next=extract multi lag particle cache or true trajectory</text><text x="75" y="224" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="205" y="202" width="430" height="27" fill="#b7791f" opacity="0.92" /><text x="215" y="220" font-family="Arial, sans-serif" font-size="10" fill="#fff">cached particle lag time ready event clock blocked</text><text x="660" y="222" font-family="Arial, sans-serif" font-size="11">time code=tc01; lag=0.11; cache=1; lag ready=1</text><text x="660" y="244" font-family="Arial, sans-serif" font-size="10" fill="#555">axis0=isoconfigurational trajectory replicates; frame-axis time=0; event clock=0</text><text x="660" y="264" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=frame_axis_is_isoconfigurational_replicates; next=extract multi lag particle cache or true trajectory</text>
</svg>
