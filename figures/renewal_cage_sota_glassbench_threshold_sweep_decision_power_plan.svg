  <text x="640" y="98" font-family="Arial, sans-serif" font-size="12" font-weight="700">member-level uncertainty requirement</text>
  <text x="75" y="138" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="205" y="116" width="410" height="27" fill="#805ad5" opacity="0.92" /><text x="215" y="134" font-family="Arial, sans-serif" font-size="10" fill="#fff">independent member extension required</text><text x="640" y="136" font-family="Arial, sans-serif" font-size="11">members=1/3; add=2; pooled particles allowed=0</text><text x="640" y="158" font-family="Arial, sans-serif" font-size="10" fill="#555">required columns=member_mean_persistence_sensitivity_ratio; member_max_post_crossing_recross_fraction; </text><text x="640" y="178" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=independent member uncertainty; next=extract at least 2 additional independent members and compute </text><text x="75" y="226" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="205" y="204" width="410" height="27" fill="#805ad5" opacity="0.92" /><text x="215" y="222" font-family="Arial, sans-serif" font-size="10" fill="#fff">independent member extension required</text><text x="640" y="224" font-family="Arial, sans-serif" font-size="11">members=1/3; add=2; pooled particles allowed=0</text><text x="640" y="246" font-family="Arial, sans-serif" font-size="10" fill="#555">required columns=member_mean_persistence_sensitivity_ratio; member_max_post_crossing_recross_fraction; </text><text x="640" y="266" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=independent member uncertainty; next=extract at least 2 additional independent members and compute </text>
