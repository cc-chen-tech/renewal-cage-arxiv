  <text x="660" y="96" font-family="Arial, sans-serif" font-size="12" font-weight="700">direct displacement tail vs PE bound</text>
  <text x="75" y="136" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.23</text><rect x="205" y="114" width="430" height="27" fill="#9f1239" opacity="0.92" /><text x="215" y="132" font-family="Arial, sans-serif" font-size="10" fill="#fff">direct displacement tail exceeds pe single event bound</text><text x="660" y="134" font-family="Arial, sans-serif" font-size="11">structure=151; crossing=tc40; samples=25800; q_all/q_max=1</text><text x="660" y="156" font-family="Arial, sans-serif" font-size="10" fill="#555">tail fraction above bound=0.235; tail mean/q_max=3.69; q90=1.39; q95=2.37</text><text x="660" y="176" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=event segmentation; next=segment particle cage jump events and measure per even</text><text x="75" y="224" font-family="Arial, sans-serif" font-size="12" font-weight="700">KA2D T=0.30</text><rect x="205" y="202" width="430" height="27" fill="#4a5568" opacity="0.92" /><text x="215" y="220" font-family="Arial, sans-serif" font-size="10" fill="#fff">pe feasibility bound upstream incomplete</text><text x="660" y="222" font-family="Arial, sans-serif" font-size="11">structure=none; crossing=none; samples=0; q_all/q_max=0</text><text x="660" y="244" font-family="Arial, sans-serif" font-size="10" fill="#555">tail fraction above bound=0; tail mean/q_max=0; q90=0; q95=0</text><text x="660" y="264" font-family="Arial, sans-serif" font-size="10" fill="#555">blocker=pe feasibility bound; next=complete direct alpha pe feasibility bound</text>
