<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="580" viewBox="0 0 1120 580">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="60" y="42" font-family="Arial, sans-serif" font-size="23" font-weight="700">Low-temperature waiting-law and shuffle diagnostic</text>
  <text x="60" y="68" font-family="Arial, sans-serif" font-size="13" fill="#444">T=0.45; p_hop uses fixed 5+5 windows and preregistered thresholds 0.16-0.24.</text>
  <text x="75" y="102" font-family="Arial, sans-serif" font-size="16" font-weight="700">A. Nominal-threshold jump-count Fano</text>
  <line x1="75" y1="440" x2="530" y2="440" stroke="#222" />
  <line x1="75" y1="440" x2="75" y2="120" stroke="#222" />
  <polyline points="75.00,379.50 188.75,338.81 302.50,287.71 416.25,229.08 530.00,162.86" fill="none" stroke="#111827" stroke-width="3" /><polyline points="75.00,382.06 188.75,341.51 302.50,296.53 416.25,245.14 530.00,183.75" fill="none" stroke="#6b7280" stroke-width="3" /><polyline points="75.00,373.79 188.75,332.26 302.50,287.78 416.25,243.70 530.00,200.68" fill="none" stroke="#047857" stroke-width="3" /><polyline points="75.00,409.47 188.75,370.92 302.50,324.43 416.25,273.83 530.00,223.85" fill="none" stroke="#b45309" stroke-width="3" />
  <line x1="75" y1="490" x2="97" y2="490" stroke="#111827" stroke-width="3" /><text x="102" y="494" font-family="Arial, sans-serif" font-size="11">actual</text><line x1="185" y1="490" x2="207" y2="490" stroke="#6b7280" stroke-width="3" /><text x="212" y="494" font-family="Arial, sans-serif" font-size="11">sequence shuffle</text><line x1="295" y1="490" x2="317" y2="490" stroke="#047857" stroke-width="3" /><text x="322" y="494" font-family="Arial, sans-serif" font-size="11">empirical iid</text><line x1="405" y1="490" x2="427" y2="490" stroke="#b45309" stroke-width="3" /><text x="432" y="494" font-family="Arial, sans-serif" font-size="11">gamma iid</text>
  <text x="625" y="102" font-family="Arial, sans-serif" font-size="16" font-weight="700">B. Threshold-stable decomposition</text>
  <line x1="625" y1="440" x2="1060" y2="440" stroke="#222" />
  <line x1="625" y1="440" x2="625" y2="120" stroke="#222" />
  <line x1="625" y1="200.00" x2="1060" y2="200.00" stroke="#999" stroke-dasharray="5 4" />
  <polyline points="625.00,383.02 842.50,424.62 1060.00,416.76" fill="none" stroke="#047857" stroke-width="3" /><polyline points="625.00,374.66 842.50,420.50 1060.00,434.09" fill="none" stroke="#2563eb" stroke-width="3" /><polyline points="625.00,331.42 842.50,351.69 1060.00,243.33" fill="none" stroke="#7c3aed" stroke-width="3" />
  <line x1="625" y1="490" x2="647" y2="490" stroke="#047857" stroke-width="3" /><text x="652" y="494" font-family="Arial, sans-serif" font-size="11">empirical error</text><line x1="765" y1="490" x2="787" y2="490" stroke="#2563eb" stroke-width="3" /><text x="792" y="494" font-family="Arial, sans-serif" font-size="11">memory excess</text><line x1="905" y1="490" x2="927" y2="490" stroke="#7c3aed" stroke-width="3" /><text x="932" y="494" font-family="Arial, sans-serif" font-size="11">environment excess</text>
  <text x="60" y="548" font-family="Arial, sans-serif" font-size="12" fill="#444">Empirical iid is sufficient for single-particle counts; collective count covariance remains 15-37x and requires a spatial test.</text>
</svg>
